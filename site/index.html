<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0e1015" />
    <!-- Title, description, canonical and Open Graph / Twitter tags are injected
         per deployment from config.json by scripts/generate-seo.mjs; the values
         below are fallbacks for local/dev builds where that step doesn't run. -->
    <title>Status</title>
    <meta name="description" content="Live service status." />
    <link
      rel="alternate"
      type="application/atom+xml"
      title="Status incidents"
      href="/incidents.atom"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/duotone/style.css"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
